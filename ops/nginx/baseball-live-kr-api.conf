server {
    listen 80;
    listen [::]:80;
    server_name api.baseball-live.kro.kr;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.baseball-live.kro.kr;

    ssl_certificate /etc/letsencrypt/live/api.baseball-live.kro.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.baseball-live.kro.kr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/baseball-live-kr-api.access.log;
    error_log /var/log/nginx/baseball-live-kr-api.error.log;

    location / {
        proxy_pass http://127.0.0.1:17361;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
